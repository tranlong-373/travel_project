{% extends 'base.html' %}

{% block content %}
<h2>Accommodation List</h2>

<ul>
    {% for item in accommodations %}
        <li>
            <a href="/accommodations/{{ item.id }}/">{{ item.name }}</a>
            - {{ item.area }} - {{ item.price_per_night }} VND
        </li>
    {% endfor %}
</ul>
{% endblock %}
