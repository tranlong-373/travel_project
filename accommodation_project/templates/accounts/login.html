{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="login">
    <div class="login-form">
        <h1>Login</h1>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <!-- Dùng form từ AuthenticationForm -->
            <input type="text" 
                   name="username" 
                   placeholder="Username" 
                   required />
            <input type="password" 
                   name="password" 
                   placeholder="Password" 
                   required />

            <!-- Hiện lỗi nếu sai -->
            {% if form.errors %}
                <div class="error-msg">Username hoặc mật khẩu không đúng!</div>
            {% endif %}

            <button type="submit">Login</button>
        </form>

        <div class="form-switch">
            <span onclick="window.location.href='{% url 'register' %}'">Sign Up Now</span>
        </div>
    </div>
</div>

{% endblock %}
